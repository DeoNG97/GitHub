<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <script src="https://cdn.tailwindcss.com"></script>

    <title>Projet github</title>
</head>
<body>
  <!-- Header élégant -->
<header class="bg-gradient-to-r from-indigo-600 via-purple-600 to-pink-600 text-white shadow-lg fixed w-full top-0 z-50">

    <!-- Logo / Nom -->
    <a href="#" class="text-3xl font-extrabold tracking-wide hover:text-yellow-300 transition">
      Deo Portfolio
    </a>
    
    <!-- Menu -->
    <nav class="hidden md:flex space-x-8 text-lg font-medium">
      <a href="#about" class="hover:text-yellow-300 transition">À propos</a>
      <a href="#projects" class="hover:text-yellow-300 transition">Projets</a>
      <a href="#skills" class="hover:text-yellow-300 transition">Compétences</a>

  <div class="bg-black bg-opacity-60 p-10 rounded-xl text-center max-w-2xl">
    <h1 class="text-5xl md:text-7xl font-extrabold text-white mb-6 drop-shadow-lg">
      Bienvenue sur mon Portfolio
    </h1>
    <p class="text-xl md:text-2xl text-gray-200 mb-8">
      Développeur Full-Stack passionné par les dashboards modulaires et les architectures web.
    </p>
    <a href="#projects" class="bg-yellow-400 hover:bg-yellow-500 text-black px-8 py-4 rounded-lg font-semibold shadow-md transition">
      Découvrir mes projets
